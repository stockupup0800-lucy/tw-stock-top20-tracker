<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股成交值排行 TOP 20</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #1a1a1a; }
  .container { max-width: 860px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 16px; }
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab-group button { padding: 5px 14px; font-size: 13px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 6px; color: #555; }
  .tab-group button.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .status { font-size: 12px; color: #666; margin-left: auto; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  thead th { background: #fafafa; font-size: 12px; font-weight: 500; color: #888; padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
  th.r, td.r { text-align: right; }
  tbody td { padding: 10px 12px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }
  .rank { font-size: 13px; color: #999; width: 32px; display: inline-block; text-align: center; }
  .rank.gold { color: #b8860b; font-weight: 600; }
  .rank.silver { color: #707070; font-weight: 600; }
  .rank.bronze { color: #8b5e3c; font-weight: 600; }
  .name { font-weight: 500; }
  .code { font-size: 12px; color: #999; }
  .up { color: #c0392b; }
  .dn { color: #2471a3; }
  .flat { color: #999; }
  .streak { display: inline-flex; align-items: center; justify-content: center; min-width: 52px; padding: 2px 10px; border-radius: 99px; font-size: 12px; font-weight: 500; }
  .s1 { background: #e8f4ff; color: #1a6fa8; }
  .s2 { background: #eafbe7; color: #2d7a38; }
  .s3 { background: #fff3e0; color: #b06000; }
  .s4 { background: #fdecea; color: #b03020; }
  .empty { text-align: center; padding: 48px; color: #aaa; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <h1>台股成交值排行 TOP 20</h1>
  <p class="subtitle" id="subtitle">載入中...</p>
  <div class="toolbar">
    <div class="tab-group">
      <button class="active" onclick="showMarket('twse',this)">上市 TWSE</button>
      <button onclick="showMarket('tpex',this)">上櫃 TPEx</button>
    </div>
    <span class="status" id="status"></span>
  </div>
  <div id="table-area"><p class="empty">載入資料中...</p></div>
</div>

<script>
// ⚠️ 把下面這行換成你的 GitHub 帳號和 repo 名稱
const DATA_URL = 'https://raw.githubusercontent.com/stockupup0800-lucy/tw-stock-top20-tracker/main/data.json';

let data = null;
let currentMarket = 'twse';

async function init() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    data = await res.json();
    document.getElementById('subtitle').textContent =
      `資料更新時間：${data.last_updated}　（每個交易日 15:00 自動更新）`;
    document.getElementById('status').textContent = `歷史已累積 ${Object.keys(data.history||{}).length} 個交易日`;
    renderTable('twse');
  } catch(e) {
    document.getElementById('table-area').innerHTML =
      '<p class="empty">⚠️ 載入失敗，請確認 data.json 已存在於 repo，或檢查 DATA_URL 設定</p>';
  }
}

function showMarket(m, btn) {
  currentMarket = m;
  document.querySelectorAll('.tab-group button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(m);
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function changeClass(c) {
  if (!c || c === '--') return 'flat';
  const n = parseFloat(c.replace(/[^0-9.\-]/g,''));
  if (isNaN(n) || n === 0) return 'flat';
  return n > 0 ? 'up' : 'dn';
}

function streakClass(n) {
  if (n === 1) return 's1';
  if (n <= 5) return 's2';
  if (n <= 20) return 's3';
  return 's4';
}

function streakLabel(n) {
  return n === 1 ? '新上榜' : `${n} 天`;
}

function renderTable(market) {
  const stocks = data[market] || [];
  if (!stocks.length) {
    document.getElementById('table-area').innerHTML = '<p class="empty">今日無資料（非交易日或尚未更新）</p>';
    return;
  }
  const rows = stocks.map((s,i) => `
    <tr>
      <td><span class="rank ${rankClass(i)}">${s.rank}</span></td>
      <td><div class="name">${s.name}</div><div class="code">${s.code}</div></td>
      <td class="r">${s.turnover}</td>
      <td class="r ${changeClass(s.price)}">${s.price}</td>
      <td class="r ${changeClass(s.change)}">${s.change}</td>
      <td class="r"><span class="streak ${streakClass(s.streak)}">${streakLabel(s.streak)}</span></td>
    </tr>`).join('');
  document.getElementById('table-area').innerHTML = `
    <table>
      <thead><tr>
        <th>名次</th><th>股票</th>
        <th class="r">成交值（千元）</th>
        <th class="r">收盤價</th>
        <th class="r">漲跌</th>
        <th class="r">連續上榜</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

init();
</script>
</body>
</html>
